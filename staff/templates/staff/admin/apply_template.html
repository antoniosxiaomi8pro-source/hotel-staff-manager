{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
    <h1>🎯 Εφαρμογή Template σε Πολλά Τμήματα</h1>
    
    <div class="module" style="max-width: 800px; margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 8px;">
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">📋 Επίλεξε Global Template:</label>
                {{ form.template }}
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">🏢 Επίλεξε Τμήματα (πολλαπλή επιλογή):</label>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 300px; overflow-y: auto; padding: 10px; background: white; border-radius: 4px;">
                    {% for dept in form.departments %}
                    <label style="display: flex; align-items: center; padding: 6px; cursor: pointer; border-radius: 4px;">
                        {{ dept.tag }}
                        <span style="margin-left: 6px;">{{ dept.choice_label }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            
            <button type="submit" class="btn btn-success" style="background: #27ae60; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">
                🚀 Εφαρμογή σε Επιλεγμένα Τμήματα
            </button>
        </form>
    </div>
    
    <div style="margin-top: 20px;">
        <a href="/admin/staff/globalshifttemplate/" class="btn btn-secondary" style="background: #95a5a6; color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px;">
            ← Πίσω στα Global Templates
        </a>
    </div>
</div>
{% endblock %}
