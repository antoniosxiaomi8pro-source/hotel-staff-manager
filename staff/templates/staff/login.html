<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Σύνδεση - Hotel Staff Manager</title>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .login-box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #555; }
        input { width: 100%; padding: 0.75rem; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 16px; }
        input:focus { border-color: #667eea; outline: none; }
        button { width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background: #5568d3; }
        .alert { padding: 0.75rem; background: #f8d7da; color: #721c24; border-radius: 6px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Hotel Staff Manager</h1>
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Όνομα Χρήστη</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Κωδικός</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Σύνδεση</button>
        </form>
    </div>
</body>
</html>
